<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>競賽進行中</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4" style="max-width: 1100px;">
    <div class="card app-card">
      <div class="card-body p-4">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
          <div>
            <div class="small-muted">競賽代號</div>
            <div id="gameCode" class="game-code">------</div>
            <div class="small-muted">
              使用者：<span id="currentUser"></span> ｜ 題目類別：<span id="currentQCat"></span>
            </div>
          </div>
          <div class="text-lg-end">
            <div class="stat-pill">目前加入人數：<span id="playerCount">0</span> 人</div>
            <div class="stat-pill">目前題號：<span id="questionNo">0</span></div>
            <div class="quiz-timer mt-2" id="timer">15</div>
          </div>
        </div>

        <div class="row g-4">
          <div class="col-lg-8">
            <div class="question-box mb-4">
              <div class="section-title mb-2">題目</div>
              <div id="questionText" class="fs-5">載入中...</div>
            </div>

            <div class="question-box mb-4">
              <div class="section-title mb-3">請選擇答案</div>
              <div id="answerArea"></div>
              <div class="d-flex gap-2 mt-3">
                <button id="submitBtn" class="btn btn-success">送出答案</button>
                <a href="index.html" class="btn btn-secondary">回首頁</a>
              </div>
              <div id="actionMsg" class="text-danger mt-3"></div>
              <div class="small-muted mt-2">每題倒數 15 秒。時間到後會自動鎖定作答，並顯示各答案選取人數與前三名。</div>
            </div>

            <div class="question-box" id="resultPanel">
              <div class="section-title mb-3">本題統計</div>
              <div id="distributionArea" class="mb-3">尚未結算。</div>
              <div id="correctArea" class="fw-bold"></div>
            </div>
          </div>

          <div class="col-lg-4">
            <div class="question-box mb-4">
              <div class="section-title mb-3">目前前三名</div>
              <div id="rankArea">尚無資料。</div>
            </div>

            <div class="question-box">
              <div class="section-title mb-3">主持控制</div>
              <div id="hostTools" style="display:none;">
                <div class="small-muted mb-3">只有建立競賽的人可以控制下一題與結束競賽。</div>
                <button id="nextBtn" class="btn btn-primary w-100 mb-2" disabled>下一題</button>
                <button id="endBtn" class="btn btn-outline-danger w-100">結束競賽</button>
              </div>
              <div id="nonHostTools" class="small-muted">若您不是主持者，系統會自動跟隨目前競賽進度。</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
