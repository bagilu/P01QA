<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P01Main</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width: 700px;">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h3 mb-4">選擇題系統</h1>

        <div class="mb-3">
          <label for="userId" class="form-label">暱稱（UserID）</label>
          <input type="text" id="userId" class="form-control" placeholder="請輸入暱稱">
        </div>

        <div class="mb-4">
          <label for="qcatSelect" class="form-label">題目類別</label>
          <select id="qcatSelect" class="form-select">
            <option value="">載入中...</option>
          </select>
        </div>

        <button id="startBtn" class="btn btn-primary">開始</button>

        <div id="msg" class="mt-3 text-danger"></div>
      </div>
    </div>
  </div>

  <script>
    async function loadQCatOptions() {
      const select = document.getElementById('qcatSelect');
      const msg = document.getElementById('msg');

      try {
        const { data, error } = await supabaseClient
          .from('TblP01Question')
          .select('QCat')
          .order('QCat', { ascending: true });

        if (error) throw error;

        const uniqueCats = [...new Set(
          (data || [])
            .map(item => (item.QCat || '').trim())
            .filter(v => v !== '')
        )];

        select.innerHTML = '';

        if (uniqueCats.length === 0) {
          select.innerHTML = '<option value="">目前沒有題目類別</option>';
          return;
        }

        select.innerHTML = '<option value="">請選擇題目類別</option>';
        uniqueCats.forEach(cat => {
          const option = document.createElement('option');
          option.value = cat;
          option.textContent = cat;
          select.appendChild(option);
        });
      } catch (err) {
        console.error(err);
        msg.textContent = '讀取題目類別失敗，請檢查 Supabase 設定或 RLS policy。';
        select.innerHTML = '<option value="">讀取失敗</option>';
      }
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      const userId = document.getElementById('userId').value.trim();
      const qcat = document.getElementById('qcatSelect').value;
      const msg = document.getElementById('msg');

      msg.textContent = '';

      if (!userId) {
        msg.textContent = '請先輸入暱稱。';
        return;
      }

      if (!qcat) {
        msg.textContent = '請先選擇題目類別。';
        return;
      }

      localStorage.setItem('P01_UserID', userId);
      localStorage.setItem('P01_QCat', qcat);

      window.location.href = 'P02Q.html';
    });

    loadQCatOptions();
  </script>
</body>
</html>
