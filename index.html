<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的卡呼</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>
  <div class="container py-5" style="max-width: 1100px;">
    <div class="card app-card">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <h1 class="mb-2">Kahoot 風格選擇題系統</h1>
          <div class="soft-label">可以先自己玩，也可以建立 6 位數競賽代號，讓其他人加入同一場競賽。</div>
        </div>

        <div class="row g-4">
          <div class="col-md-6">
            <div class="mode-card h-100">
              <div class="mode-title mb-2">自己玩／建立競賽</div>
              <div class="soft-label mb-3">輸入暱稱與題目類別後開始。系統會自動產生一組 6 位數競賽代號，其他人可用這組代號加入。</div>

              <div class="mb-3">
                <label class="form-label">暱稱</label>
                <input type="text" id="createUserId" class="form-control" placeholder="例如：Jimmy">
              </div>

              <div class="mb-3">
                <label class="form-label">題目類別</label>
                <select id="createQCat" class="form-select">
                  <option value="">載入中...</option>
                </select>
              </div>

              <button id="createGameBtn" class="btn btn-primary w-100">開始自己玩</button>
              <div id="createMsg" class="text-danger mt-3"></div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="mode-card h-100">
              <div class="mode-title mb-2">加入競賽</div>
              <div class="soft-label mb-3">若朋友已經開始遊戲，請輸入暱稱與 6 位數競賽代號加入。同一場競賽中的所有人會看到同一題。</div>

              <div class="mb-3">
                <label class="form-label">暱稱</label>
                <input type="text" id="joinUserId" class="form-control" placeholder="例如：Amy">
              </div>

              <div class="mb-3">
                <label class="form-label">競賽代號</label>
                <input type="text" id="joinCode" class="form-control" maxlength="6" placeholder="請輸入 6 位數字">
              </div>

              <button id="joinGameBtn" class="btn btn-success w-100">加入競賽</button>
              <div id="joinMsg" class="text-danger mt-3"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
