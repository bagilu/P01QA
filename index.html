<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P01我的卡呼</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>
  <div class="container py-5" style="max-width: 1200px;">
    <div class="card app-card">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <h1 class="mb-2">P01我的卡呼</h1>
          <div class="sub-title mb-2">慈濟大學經營管理學系學生專題</div>
          <div class="soft-label">可以先自己玩，也可以建立 6 位數競賽代號，讓其他人加入同一場競賽。</div>
        </div>

        <div class="row g-4">
          <div class="col-lg-8">
            <div class="mode-card h-100">
              <div class="mode-title mb-2">建立競賽／自己玩</div>
              <div class="soft-label mb-3">請先輸入暱稱，並勾選要出題的小類別。建立後系統會先停留在等待畫面，等您按下「開始第一題」才正式開始。</div>

              <div class="mb-4">
                <label class="form-label">暱稱</label>
                <input type="text" id="createUserId" class="form-control" placeholder="例如：Jimmy">
              </div>

              <div class="mb-3">
                <div class="form-label mb-2">題目類別（可複選第二層類別）</div>
                <div id="categoryBoard" class="category-board">
                  <div class="small-muted">載入中...</div>
                </div>
              </div>

              <button id="createGameBtn" class="btn btn-primary w-100">建立競賽</button>
              <div id="createMsg" class="text-danger mt-3"></div>
            </div>
          </div>

          <div class="col-lg-4">
            <div class="mode-card h-100">
              <div class="mode-title mb-2">加入競賽</div>
              <div class="soft-label mb-3">若朋友已建立競賽，請輸入暱稱與 6 位數競賽代號加入。同一場競賽中的所有人會看到同一題。</div>

              <div class="mb-3">
                <label class="form-label">暱稱</label>
                <input type="text" id="joinUserId" class="form-control" placeholder="例如：Amy">
              </div>

              <div class="mb-3">
                <label class="form-label">競賽代號</label>
                <input type="text" id="joinCode" class="form-control" maxlength="6" placeholder="請輸入 6 位數字">
              </div>

              <button id="joinGameBtn" class="btn btn-success w-100">加入競賽</button>
              <div id="joinMsg" class="text-danger mt-3"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
