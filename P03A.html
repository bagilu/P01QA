<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P03A</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width: 700px;">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h3 mb-4">作答結果</h1>

        <div class="mb-3">
          <div class="fw-bold mb-2">題目</div>
          <div id="showQuestion"></div>
        </div>

        <div class="mb-3">
          <div class="fw-bold mb-2">您的答案</div>
          <div id="showSelected"></div>
        </div>

        <div class="mb-3">
          <div class="fw-bold mb-2">結果</div>
          <div id="showResult" class="fs-4"></div>
        </div>

        <div class="mb-4" id="correctArea" style="display:none;">
          <div class="fw-bold mb-2">正確答案</div>
          <div id="showCorrect" class="text-success"></div>
        </div>

        <button id="nextBtn" class="btn btn-primary">下一題</button>
        <a href="P01Main.html" class="btn btn-secondary ms-2">回首頁</a>
      </div>
    </div>
  </div>

  <script>
    const resultText = localStorage.getItem('P01_LastResult');

    if (!resultText) {
      window.location.href = 'P01Main.html';
    } else {
      const result = JSON.parse(resultText);

      document.getElementById('showQuestion').textContent = result.Q;
      document.getElementById('showSelected').textContent = result.Selected;

      if (result.IsCorrect) {
        document.getElementById('showResult').textContent = '✅ 正確';
        document.getElementById('showResult').classList.add('text-success');
      } else {
        document.getElementById('showResult').textContent = '❌ 錯誤';
        document.getElementById('showResult').classList.add('text-danger');
        document.getElementById('correctArea').style.display = 'block';
        document.getElementById('showCorrect').textContent = result.CA;
      }
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
      window.location.href = 'P02Q.html';
    });
  </script>
</body>
</html>
